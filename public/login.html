<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VivoPoint — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sora',sans-serif;background:#f4f6f9;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.card{background:#fff;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,0.08),0 8px 32px rgba(0,0,0,0.06);width:100%;max-width:400px;overflow:hidden}
.header{background:#0b1929;padding:28px 32px;text-align:center}
.logo{font-size:22px;font-weight:600;color:#fff;letter-spacing:-0.3px}
.logo span{color:#3b9eff}
.subtitle{font-size:12px;color:rgba(255,255,255,0.45);margin-top:4px;font-weight:300}
.body{padding:28px 32px}
.field{margin-bottom:16px}
.field label{display:block;font-size:11px;font-weight:600;color:#8fa5bb;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:5px}
.field input{width:100%;height:40px;padding:0 12px;border:1px solid rgba(0,0,0,0.12);border-radius:8px;font-size:13px;font-family:'Sora',sans-serif;color:#0d1f35;transition:border-color 0.15s,box-shadow 0.15s;background:#fff}
.field input:focus{outline:none;border-color:#2e7dda;box-shadow:0 0 0 3px rgba(46,125,218,0.12)}
.btn{width:100%;height:42px;background:#2e7dda;color:#fff;border:none;border-radius:8px;font-size:13px;font-family:'Sora',sans-serif;font-weight:500;cursor:pointer;transition:background 0.15s;margin-top:4px}
.btn:hover{background:#2570c8}
.btn:disabled{opacity:0.55;cursor:not-allowed}
.error{background:#fde8e5;border:1px solid #f09090;border-radius:8px;padding:10px 14px;font-size:12px;color:#a02a1a;margin-bottom:16px;display:none}
.footer{text-align:center;padding:16px;font-size:11px;color:#8fa5bb;border-top:1px solid rgba(0,0,0,0.06)}
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <div class="logo"><span>VIVO</span>POINT</div>
    <div class="subtitle">Controller Configuration Tool</div>
  </div>
  <div class="body">
    <div class="error" id="error-msg"></div>
    <div class="field">
      <label>Email address</label>
      <input type="email" id="email" placeholder="you@vivoaquatics.com" autocomplete="email">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn" id="login-btn" onclick="doLogin()">Sign in</button>
  </div>
  <div class="footer">VivoAquatics · Internal Tool</div>
</div>

<script>
document.getElementById('password').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
document.getElementById('email').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('password').focus(); });

// Redirect if already logged in
fetch('/api/auth/me').then(r => r.json()).then(d => {
  if (d.user) window.location.replace('/');
}).catch(() => {});

async function doLogin() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('login-btn');
  const errEl = document.getElementById('error-msg');

  errEl.style.display = 'none';
  if (!email || !password) { showError('Please enter your email and password.'); return; }

  btn.disabled = true; btn.textContent = 'Signing in...';

  try {
    const r = await fetch('/api/auth/login', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ email, password }),
    });
    const data = await r.json();
    if (data.ok) {
      window.location.replace('/');
    } else {
      showError(data.error || 'Login failed.');
      btn.disabled = false; btn.textContent = 'Sign in';
    }
  } catch(e) {
    showError('Cannot reach server. Please try again.');
    btn.disabled = false; btn.textContent = 'Sign in';
  }
}

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg; el.style.display = 'block';
}
</script>
</body>
</html>
